apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: disk-alerts
    rules:
    - alert: HighDiskUsage
      expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes * 100 > 80
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Disk usage above 80%"
        description: "Disk is {{ $value }}% full"

  - name: pod-alerts
    rules:
    - alert: PodNotRunning
      expr: kube_pod_status_phase{phase!="Running", phase!="Succeeded"} == 1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod is not running"
        description: "Pod {{ $labels.pod }} is in {{ $labels.phase }} state"
